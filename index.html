<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Kepty English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p style="padding: 2rem; font-family: system-ui, sans-serif;">
        このサイトを表示するには JavaScript を有効にしてください。
      </p>
    </noscript>
    <script>
      window.__keptyBootTimer = window.setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div style="max-width:32rem;margin:3rem auto;padding:1.5rem;font-family:system-ui,sans-serif;line-height:1.6;color:#171717">' +
            '<p style="font-weight:700;margin:0 0 0.75rem">ページの読み込みに失敗しました</p>' +
            '<p style="margin:0 0 0.75rem;font-size:0.9rem">古いキャッシュが残っている可能性があります。次をお試しください。</p>' +
            '<ol style="margin:0;padding-left:1.25rem;font-size:0.9rem">' +
            '<li>スーパーリロード（Mac: Cmd+Shift+R / Win: Ctrl+Shift+R）</li>' +
            '<li>シークレットウィンドウで開く</li>' +
            '<li>URL が <code>…/Kepty-English-Official-Website/</code> まで含まれているか確認</li>' +
            '</ol></div>';
        }
      }, 6000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
